name: Deploy Frontend → Vercel

on:
  push:
    branches: [main]
    paths:
      - "asteria-web/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: asteria-web/package-lock.json

      - name: Install dependencies
        run: |
          cd asteria-web
          npm ci

      - name: Type check
        run: |
          cd asteria-web
          npx tsc --noEmit

      - name: Build
        run: |
          cd asteria-web
          npm run build
        env:
          NEXT_PUBLIC_API_URL:   ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_BASE_PATH: /asteria
          NEXT_PUBLIC_SERVICE:   asteria

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:    ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:   ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: asteria-web
          vercel-args:     "--prod"

      - name: Verify deployment
        run: |
          sleep 15
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://uranai-hub.jp/asteria/ || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Frontend deployment verified (HTTP $STATUS)"
          else
            echo "⚠️  Frontend returned HTTP $STATUS — check Vercel logs"
          fi
